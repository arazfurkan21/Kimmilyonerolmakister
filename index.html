<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Çok Kollu Yaratık</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0b0b0b;
            cursor: crosshair;
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>

    <canvas id="creatureCanvas"></canvas>

    <script>
        const canvas = document.getElementById("creatureCanvas");
        const ctx = canvas.getContext("2d");

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        const Input = {
            mouse: {
                x: canvas.width / 2,
                y: canvas.height / 2
            }
        };

        window.addEventListener("mousemove", (event) => {
            Input.mouse.x = event.clientX;
            Input.mouse.y = event.clientY;
        });

        let segments = [];
        const numSegments = 55; 
        const baseDistance = 9.0; 

        for (let i = 0; i < numSegments; i++) {
            segments.push({ x: canvas.width / 2, y: canvas.height / 2 });
        }

        function update() {
            let targetX = Input.mouse.x;
            let targetY = Input.mouse.y;

            // Hızı düşürülerek daha yumuşak ve süzülen bir hareket sağlandı
            segments[0].x += (targetX - segments[0].x) * 0.08;
            segments[0].y += (targetY - segments[0].y) * 0.08;

            for (let i = 1; i < segments.length; i++) {
                let lead = segments[i - 1];
                let current = segments[i];
                let dx = lead.x - current.x;
                let dy = lead.y - current.y;
                let angle = Math.atan2(dy, dx);

                current.x = lead.x - Math.cos(angle) * baseDistance;
                current.y = lead.y - Math.sin(angle) * baseDistance;
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            ctx.strokeStyle = "rgba(255, 255, 255, 0.9)";
            ctx.fillStyle = "rgba(255, 255, 255, 0.9)";
            ctx.lineWidth = 1.5;
            ctx.lineCap = "round";

            // Omurga çizgisi
            ctx.beginPath();
            ctx.moveTo(segments[0].x, segments[0].y);
            for (let i = 1; i < segments.length; i++) {
                ctx.lineTo(segments[i].x, segments[i].y);
            }
            ctx.stroke();

            // Çizgilere tam yapışık çoklu kollar ve bacaklar
            for (let i = 3; i < segments.length - 2; i += 2) {
                let current = segments[i];
                let next = segments[i + 1];
                
                let angle = Math.atan2(next.y - current.y, next.x - current.x);
                let perpAngle = angle + Math.PI / 2; 

                let armLength = (55 * Math.sin((Math.PI * i) / segments.length)) + 10;

                // Doğrudan omurga çizgisi üzerinden (çizgiye yapışık) başlayan bacak uçları
                let leftX = current.x + Math.cos(perpAngle) * armLength;
                let leftY = current.y + Math.sin(perpAngle) * armLength;
                
                let rightX = current.x - Math.cos(perpAngle) * armLength;
                let rightY = current.y - Math.sin(perpAngle) * armLength;

                // Eklem yapıları
                let kneeBend = Math.sin(Date.now() * 0.005 + i) * 15;
                let midLeftX = (current.x + leftX) / 2 - Math.sin(angle) * kneeBend;
                let midLeftY = (current.y + leftY) / 2 + Math.cos(angle) * kneeBend;

                let midRightX = (current.x + rightX) / 2 + Math.sin(angle) * kneeBend;
                let midRightY = (current.y - rightY) / 2 - Math.cos(angle) * kneeBend;

                ctx.beginPath();
                // Sol bacak (omurgadan direkt başlar)
                ctx.moveTo(current.x, current.y);
                ctx.lineTo(midLeftX, midLeftY);
                ctx.lineTo(leftX, leftY);

                // Sağ bacak (omurgadan direkt başlar)
                ctx.moveTo(current.x, current.y);
                ctx.lineTo(midRightX, midRightY);
                ctx.lineTo(rightX, rightY);
                
                ctx.stroke();
            }

            // Baş Kısmı
            ctx.beginPath();
            ctx.arc(segments[0].x, segments[0].y, 5, 0, Math.PI * 2);
            ctx.fill();
        }

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }

        loop();
    </script>
</body>
</html>
