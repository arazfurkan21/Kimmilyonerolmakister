<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Dragon</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #1a1a1a;
            overflow: hidden;
            cursor: crosshair;
        }
        
        canvas {
            display: block;
        }
        
        .info {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #0f0;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            z-index: 100;
        }
    </style>
</head>
<body>
    <div class="info">🐉 Interactive Dragon - Mouse'u hareket ettir</div>
    <canvas id="canvas"></canvas>
    
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        
        // Mouse pozisyonu
        let mouse = {
            x: canvas.width / 2,
            y: canvas.height / 2
        };
        
        // Input nesnesi (görüntüdeki gibi)
        const Input = {
            mouse: {
                left: false,
                middle: false,
                right: false
            }
        };
        
        // Mouse event listener'ları
        document.addEventListener("mouseup", function(event) {
            if ((event.button = 0)) {
                Input.mouse.left = false;
            }
            if ((event.button = 1)) {
                Input.mouse.middle = false;
            }
            if ((event.button = 2)) {
                Input.mouse.right = false;
            }
        });
        
        document.addEventListener("mousedown", function(event) {
            if (event.button === 0) {
                Input.mouse.left = true;
            }
            if (event.button === 1) {
                Input.mouse.middle = true;
            }
            if (event.button === 2) {
                Input.mouse.right = true;
            }
        });
        
        document.addEventListener("mousemove", function(event) {
            mouse.x = event.clientX;
            mouse.y = event.clientY;
        });
        
        window.addEventListener("resize", function() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
        
        // Ejderha segmentleri
        const segmentCount = 30;
        const segments = [];
        
        // Segment sınıfı
        class Segment {
            constructor(x, y, angle, length) {
                this.x = x;
                this.y = y;
                this.angle = angle;
                this.length = length;
                this.targetX = x;
                this.targetY = y;
            }
            
            update(targetX, targetY) {
                const dx = targetX - this.x;
                const dy = targetY - this.y;
                const distance = Math.sqrt(dx * dx + dy * dy);
                
                // Açıyı hesapla
                this.angle = Math.atan2(dy, dx);
                
                // Hedef pozisyonu güncelle
                const offsetX = Math.cos(this.angle) * this.length;
                const offsetY = Math.sin(this.angle) * this.length;
                
                this.targetX = this.x + offsetX;
                this.targetY = this.y + offsetY;
                
                // Yumuşak hareket
                this.x += (targetX - this.x) * 0.1;
                this.y += (targetY - this.y) * 0.1;
            }
            
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, 3, 0, Math.PI * 2);
                ctx.fillStyle = '#0f0';
                ctx.fill();
            }
        }
        
        // Ejderha oluştur
        function initDragon() {
            let x = canvas.width / 2;
            let y = canvas.height / 2;
            let angle = 0;
            const segmentLength = 15;
            
            for (let i = 0; i < segmentCount; i++) {
                segments.push(new Segment(x, y, angle, segmentLength));
                x += Math.cos(angle) * segmentLength;
                y += Math.sin(angle) * segmentLength;
            }
        }
        
        // Ejderha çiz (wireframe stili)
        function drawDragon() {
            ctx.strokeStyle = '#0f0';
            ctx.lineWidth = 2;
            
            // Ana omurga
            ctx.beginPath();
            ctx.moveTo(segments[0].x, segments[0].y);
            
            for (let i = 1; i < segments.length; i++) {
                const prev = segments[i - 1];
                const curr = segments[i];
                
                // Omurga çizgisi
                ctx.lineTo(curr.x, curr.y);
                
                // Kaburgalar (spiral etki)
                const ribAngle = curr.angle + Math.PI / 2;
                const ribLength = 20 - (i * 0.5);
                
                const ribX1 = curr.x + Math.cos(ribAngle) * ribLength;
                const ribY1 = curr.y + Math.sin(ribAngle) * ribLength;
                const ribX2 = curr.x - Math.cos(ribAngle) * ribLength;
                const ribY2 = curr.y - Math.sin(ribAngle) * ribLength;
                
                ctx.moveTo(ribX1, ribY1);
                ctx.lineTo(curr.x, curr.y);
                ctx.lineTo(ribX2, ribY2);
                ctx.moveTo(curr.x, curr.y);
            }
            
            ctx.stroke();
            
            // Kafa
            const head = segments[0];
            ctx.beginPath();
            ctx.arc(head.x, head.y, 12, 0, Math.PI * 2);
            ctx.fillStyle = '#0f0';
            ctx.fill();
            
            // Gözler
            const eyeOffset = 5;
            const leftEyeX = head.x + Math.cos(head.angle - 0.5) * eyeOffset;
            const leftEyeY = head.y + Math.sin(head.angle - 0.5) * eyeOffset;
            const rightEyeX = head.x + Math.cos(head.angle + 0.5) * eyeOffset;
            const rightEyeY = head.y + Math.sin(head.angle + 0.5) * eyeOffset;
            
            ctx.beginPath();
            ctx.arc(leftEyeX, leftEyeY, 3, 0, Math.PI * 2);
            ctx.arc(rightEyeX, rightEyeY, 3, 0, Math.PI * 2);
            ctx.fillStyle = '#fff';
            ctx.fill();
            
            // Kuyruk
            const tail = segments[segments.length - 1];
            ctx.beginPath();
            ctx.moveTo(tail.x, tail.y);
            const tailTipX = tail.x + Math.cos(tail.angle) * tail.length * 2;
            const tailTipY = tail.y + Math.sin(tail.angle) * tail.length * 2;
            ctx.lineTo(tailTipX, tailTipY);
            ctx.strokeStyle = '#0f0';
            ctx.lineWidth = 3;
            ctx.stroke();
        }
        
        // Ejderha güncelle
        function updateDragon() {
            // İlk segment mouse'u takip eder
            segments[0].update(mouse.x, mouse.y);
            
            // Diğer segmentler bir öncekini takip eder
            for (let i = 1; i < segments.length; i++) {
                const prev = segments[i - 1];
                segments[i].update(prev.x, prev.y);
            }
        }
        
        // Animasyon döngüsü
        function animate() {
            ctx.fillStyle = 'rgba(26, 26, 26, 0.3)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            updateDragon();
            drawDragon();
            
            requestAnimationFrame(animate);
        }
        
        // Başlat
        initDragon();
        animate();
        
        // İlk tıklama için
        document.addEventListener('click', function() {
            Input.mouse.left = true;
            setTimeout(() => {
                Input.mouse.left = false;
            }, 100);
        });
    </script>
</body>
</html>
