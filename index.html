<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Dragon - Tam Ekran</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #1a1a1a;
        }
        canvas {
            display: block;
            background-color: #111111;
        }
    </style>
</head>
<body>

    <canvas id="dragonCanvas"></canvas>

    <script>
        const canvas = document.getElementById("dragonCanvas");
        const ctx = canvas.getContext("2d");

        // Ekran boyutunu tam yap
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        const Input = {
            mouse: {
                x: canvas.width / 2,
                y: canvas.height / 2,
                left: false,
                middle: false,
                right: false
            }
        };

        window.addEventListener("mousemove", (event) => {
            Input.mouse.x = event.clientX;
            Input.mouse.y = event.clientY;
        });

        document.addEventListener("mouseup", function(event) {
            if (event.button === 0) Input.mouse.left = false;
            if (event.button === 1) Input.mouse.middle = false;
            if (event.button === 2) Input.mouse.right = false;
        });

        document.addEventListener("mousedown", function(event) {
            if (event.button === 0) Input.mouse.left = true;
            if (event.button === 1) Input.mouse.middle = true;
            if (event.button === 2) Input.mouse.right = true;
        });

        let segments = [];
        const numSegments = 70; // Uzun ve ihtişamlı gövde
        
        for (let i = 0; i < numSegments; i++) {
            segments.push({ x: canvas.width / 2, y: canvas.height / 2 });
        }

        function update() {
            let targetX = Input.mouse.x;
            let targetY = Input.mouse.y;

            segments[0].x += (targetX - segments[0].x) * 0.15;
            segments[0].y += (targetY - segments[0].y) * 0.15;

            for (let i = 1; i < segments.length; i++) {
                let lead = segments[i - 1];
                let current = segments[i];
                let dx = lead.x - current.x;
                let dy = lead.y - current.y;
                let angle = Math.atan2(dy, dx);
                let distance = 15; // Segmentler arası mesafe

                current.x = lead.x - Math.cos(angle) * distance;
                current.y = lead.y - Math.sin(angle) * distance;
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            ctx.strokeStyle = "white";
            ctx.lineWidth = 2;

            // Omurga çizgisi
            ctx.beginPath();
            ctx.moveTo(segments[0].x, segments[0].y);
            for (let i = 1; i < segments.length; i++) {
                ctx.lineTo(segments[i].x, segments[i].y);
            }
            ctx.stroke();

            // Kaburga detayları
            for (let i = 2; i < segments.length - 2; i += 2) {
                let current = segments[i];
                let next = segments[i + 1];
                let angle = Math.atan2(next.y - current.y, next.x - current.x) + Math.PI / 2;
                
                let ribLength = 40 * (1 - i / segments.length) + 6;
                let x1 = current.x + Math.cos(angle) * ribLength;
                let y1 = current.y + Math.sin(angle) * ribLength;
                let x2 = current.x - Math.cos(angle) * ribLength;
                let y2 = current.y - Math.sin(angle) * ribLength;

                ctx.beginPath();
                ctx.moveTo(x1, y1);
                ctx.lineTo(current.x, current.y);
                ctx.lineTo(x2, y2);
                ctx.stroke();
            }

            // Baş kısmı
            ctx.fillStyle = "white";
            ctx.beginPath();
            ctx.arc(segments[0].x, segments[0].y, 7, 0, Math.PI * 2);
            ctx.fill();
        }

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }

        loop();
    </script>
</body>
</html>
