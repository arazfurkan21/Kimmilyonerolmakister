<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Çok Kollu Korkutucu Yaratık</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0b0b0b;
            cursor: crosshair;
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>

    <canvas id="creatureCanvas"></canvas>

    <script>
        const canvas = document.getElementById("creatureCanvas");
        const ctx = canvas.getContext("2d");

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        const Input = {
            mouse: {
                x: canvas.width / 2,
                y: canvas.height / 2
            }
        };

        window.addEventListener("mousemove", (event) => {
            Input.mouse.x = event.clientX;
            Input.mouse.y = event.clientY;
        });

        // Yaratık segmentleri (daha kısa, kompakt ve korkutucu)
        let segments = [];
        const numSegments = 50; 
        const baseDistance = 8.0; 

        for (let i = 0; i < numSegments; i++) {
            segments.push({ x: canvas.width / 2, y: canvas.height / 2 });
        }

        function update() {
            let targetX = Input.mouse.x;
            let targetY = Input.mouse.y;

            segments[0].x += (targetX - segments[0].x) * 0.2;
            segments[0].y += (targetY - segments[0].y) * 0.2;

            for (let i = 1; i < segments.length; i++) {
                let lead = segments[i - 1];
                let current = segments[i];
                let dx = lead.x - current.x;
                let dy = lead.y - current.y;
                let angle = Math.atan2(dy, dx);

                current.x = lead.x - Math.cos(angle) * baseDistance;
                current.y = lead.y - Math.sin(angle) * baseDistance;
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // İstediğin gibi saf ve net beyaz renk
            ctx.strokeStyle = "rgba(255, 255, 255, 0.9)";
            ctx.fillStyle = "rgba(255, 255, 255, 0.9)";
            ctx.lineWidth = 1.5;
            ctx.lineCap = "round";

            // Omurga çizgisi
            ctx.beginPath();
            ctx.moveTo(segments[0].x, segments[0].y);
            for (let i = 1; i < segments.length; i++) {
                ctx.lineTo(segments[i].x, segments[i].y);
            }
            ctx.stroke();

            // Bolca Kol ve Bacak Detayları
            for (let i = 4; i < segments.length - 3; i += 3) {
                let current = segments[i];
                let next = segments[i + 1];
                
                let angle = Math.atan2(next.y - current.y, next.x - current.x);
                let perpAngle = angle + Math.PI / 2; // Dik açı (kollar için)

                // Gövdenin orta kısımlarında kollar daha uzun olsun
                let armLength = (45 * Math.sin((Math.PI * i) / segments.length)) + 15;

                // Sol kol / bacak
                let leftX = current.x + Math.cos(perpAngle) * armLength;
                let leftY = current.y + Math.sin(perpAngle) * armLength;
                
                // Sağ kol / bacak
                let rightX = current.x - Math.cos(perpAngle) * armLength;
                let rightY = current.y - Math.sin(perpAngle) * armLength;

                // Eklem kırılımı için orta nokta (böcek bacağı efekti)
                let jointOffset = Math.sin(Date.now() * 0.01 + i) * 10;
                let midLeftX = (current.x + leftX) / 2 + Math.cos(angle) * (15 + jointOffset);
                let midLeftY = (current.y + leftY) / 2 + Math.sin(angle) * (15 + jointOffset);

                let midRightX = (current.x + rightX) / 2 + Math.cos(angle) * (15 - jointOffset);
                let midRightY = (current.y + rightY) / 2 + Math.sin(angle) * (15 - jointOffset);

                ctx.beginPath();
                // Sol bacak çizimi (iki mafsallı)
                ctx.moveTo(current.x, current.y);
                ctx.lineTo(midLeftX, midLeftY);
                ctx.lineTo(leftX, leftY);

                // Sağ bacak çizimi (iki mafsallı)
                ctx.moveTo(current.x, current.y);
                ctx.lineTo(midRightX, midRightY);
                ctx.lineTo(rightX, rightY);
                
                ctx.stroke();
            }

            // Baş Kısmı
            ctx.beginPath();
            ctx.arc(segments[0].x, segments[0].y, 6, 0, Math.PI * 2);
            ctx.fill();
        }

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }

        loop();
    </script>
</body>
</html>
