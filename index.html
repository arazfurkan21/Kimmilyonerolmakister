<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Çok Bacaklı Yaratık</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0b0b0b;
            cursor: crosshair;
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>

    <canvas id="creatureCanvas"></canvas>

    <script>
        const canvas = document.getElementById("creatureCanvas");
        const ctx = canvas.getContext("2d");

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        const Input = {
            mouse: {
                x: canvas.width / 2,
                y: canvas.height / 2
            }
        };

        window.addEventListener("mousemove", (event) => {
            Input.mouse.x = event.clientX;
            Input.mouse.y = event.clientY;
        });

        let segments = [];
        const numSegments = 50; 
        const baseDistance = 9.0; 

        for (let i = 0; i < numSegments; i++) {
            segments.push({ x: canvas.width / 2, y: canvas.height / 2 });
        }

        function update() {
            let targetX = Input.mouse.x;
            let targetY = Input.mouse.y;

            segments[0].x += (targetX - segments[0].x) * 0.08;
            segments[0].y += (targetY - segments[0].y) * 0.08;

            for (let i = 1; i < segments.length; i++) {
                let lead = segments[i - 1];
                let current = segments[i];
                let dx = lead.x - current.x;
                let dy = lead.y - current.y;
                let angle = Math.atan2(dy, dx);

                current.x = lead.x - Math.cos(angle) * baseDistance;
                current.y = lead.y - Math.sin(angle) * baseDistance;
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            ctx.strokeStyle = "rgba(255, 255, 255, 0.9)";
            ctx.fillStyle = "rgba(255, 255, 255, 0.9)";
            ctx.lineWidth = 1.5;
            ctx.lineCap = "round";

            // Omurga çizgisi
            ctx.beginPath();
            ctx.moveTo(segments[0].x, segments[0].y);
            for (let i = 1; i < segments.length; i++) {
                ctx.lineTo(segments[i].x, segments[i].y);
            }
            ctx.stroke();

            // Kaburgalar ve bacaklar (Hatalı uzun çizgiler giderildi, düzgün bacaklar eklendi)
            for (let i = 4; i < segments.length - 3; i += 3) {
                let current = segments[i];
                let next = segments[i + 1];
                
                let angle = Math.atan2(next.y - current.y, next.x - current.x);
                let perpAngle = angle + Math.PI / 2; 

                let legLength = 35 * Math.sin((Math.PI * i) / segments.length) + 12;

                // Sol bacak ucu
                let leftX = current.x + Math.cos(perpAngle) * legLength;
                let leftY = current.y + Math.sin(perpAngle) * legLength;
                
                // Sağ bacak ucu
                let rightX = current.x - Math.cos(perpAngle) * legLength;
                let rightY = current.y - Math.sin(perpAngle) * legLength;

                ctx.beginPath();
                // Sol bacak gövdeden çıkış
                ctx.moveTo(current.x, current.y);
                ctx.lineTo(leftX, leftY);

                // Sol bacak parmakları (Uç kısıma minik çatallar/parmaklar)
                ctx.moveTo(leftX, leftY);
                ctx.lineTo(leftX + Math.cos(perpAngle + 0.5) * 6, leftY + Math.sin(perpAngle + 0.5) * 6);
                ctx.moveTo(leftX, leftY);
                ctx.lineTo(leftX + Math.cos(perpAngle - 0.5) * 6, leftY + Math.sin(perpAngle - 0.5) * 6);

                // Sağ bacak gövdeden çıkış
                ctx.moveTo(current.x, current.y);
                ctx.lineTo(rightX, rightY);

                // Sağ bacak parmakları
                ctx.moveTo(rightX, rightY);
                ctx.lineTo(rightX + Math.cos(perpAngle - 0.5 + Math.PI) * 6, rightY + Math.sin(perpAngle - 0.5 + Math.PI) * 6);
                ctx.moveTo(rightX, rightY);
                ctx.lineTo(rightX + Math.cos(perpAngle + 0.5 + Math.PI) * 6, rightY + Math.sin(perpAngle + 0.5 + Math.PI) * 6);

                ctx.stroke();
            }

            // Baş Kısmı
            ctx.beginPath();
            ctx.arc(segments[0].x, segments[0].y, 5, 0, Math.PI * 2);
            ctx.fill();
        }

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }

        loop();
    </script>
</body>
</html>
